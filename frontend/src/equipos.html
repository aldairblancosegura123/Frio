<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0A1B2D" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/app-icon.svg" />
    <title>Equipos — FríoTech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
  </head>
  <body class="min-h-screen bg-[var(--bg)] text-[var(--text)]">
    <header class="app-header surface-raised">
      <div class="max-w-6xl mx-auto flex items-center justify-between p-6">
        <div class="flex items-center gap-4">
          <!--<div class="w-12 h-12 rounded-3xl bg-[var(--primary)] flex items-center justify-center text-black font-semibold font-display">FT</div>-->
          <div>
            <div class="font-display text-2xl text-[var(--primary)]">Equipos del cliente</div>
            <!-- <div class="text-sm text-[var(--text-dim)]">Equipos del cliente</div> -->
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button id="volverBtn" class="btn-secondary">Volver</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 pb-12">
      <section class="surface-raised rounded-3xl p-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h3 id="clienteNombre" class="text-xl font-display">Equipos</h3>
            <p id="clienteCedula" class="text-sm text-[var(--text-dim)]"></p>
          </div>
          <button id="registrarEquipoBtn" class="btn-primary btn-small hidden">Registrar equipo</button>
        </div>

        <div id="equiposContainer" class="grid gap-4 lg:grid-cols-2"></div>
        <div id="equiposEmpty" class="text-[var(--text-dim)] mt-4 hidden">No se encontraron equipos.</div>
      </section>
    </main>

    <div id="equipoUpdateModal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
      <div id="equipoUpdateBackdrop" class="absolute inset-0 bg-black/60"></div>
      <div class="relative surface-raised rounded-3xl w-full max-w-2xl p-6">
        <div class="flex items-center justify-between gap-4 mb-4">
          <div>
            <h3 id="equipoUpdateTitle" class="text-xl font-display">Actualizar mantenimiento</h3>
            <p id="equipoUpdateSubtitle" class="text-sm text-[var(--text-dim)]">Registra la fecha y las notas de mantenimiento.</p>
          </div>
          <button id="equipoUpdateClose" class="btn-ghost">Cerrar</button>
        </div>
        <div class="grid gap-4">
          <div>
            <label class="text-sm text-[var(--text-dim)]">Último mantenimiento</label>
            <div id="equipoUpdateLastMaintenance" class="mt-1 font-mono"></div>
          </div>
          <div>
            <label class="text-sm text-[var(--text-dim)]" for="equipoUpdateDate">Nueva fecha de mantenimiento</label>
            <input id="equipoUpdateDate" type="date" class="input-field mt-1" />
          </div>
          <div>
            <label class="text-sm text-[var(--text-dim)]" for="equipoUpdateEstado">Estado</label>
            <select id="equipoUpdateEstado" class="input-field mt-1">
              <option value="operativo">Operativo</option>
              <option value="en_revision">Revisión</option>
              <option value="fuera_de_servicio">Averiado</option>
            </select>
            <label class="mt-3 inline-flex items-center gap-3 text-sm text-[var(--text)]">
              <input id="equipoUpdateMantenimientoVencido" type="checkbox" class="h-5 w-5 rounded border border-white/40 bg-white/10 accent-[var(--primary)] cursor-pointer" />
              <span>Mantenimiento vencido</span>
            </label>
          </div>
          <div>
            <label class="text-sm text-[var(--text-dim)]" for="equipoUpdateNotas">Notas</label>
            <textarea id="equipoUpdateNotas" rows="4" class="input-field mt-1 resize-none"></textarea>
          </div>
          <div id="equipoUpdateError" class="text-sm text-danger hidden"></div>
          <div id="equipoUpdateSuccess" class="text-sm text-success hidden"></div>
          <div class="flex items-center justify-end gap-3 pt-2 border-t border-white/10">
            <button id="equipoUpdateCancel" class="btn-secondary">Cancelar</button>
            <button id="equipoUpdateSave" class="btn-primary">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="registrarEquipoModal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
      <div id="registrarEquipoBackdrop" class="absolute inset-0 bg-black/60"></div>
      <div class="relative surface-raised rounded-3xl w-full max-w-2xl p-6">
        <div class="flex items-center justify-between gap-4 mb-4">
          <div>
            <h3 class="text-xl font-display">Registrar equipo</h3>
            <p class="text-sm text-[var(--text-dim)]">Registra un nuevo equipo para este cliente.</p>
          </div>
          <button id="registrarEquipoClose" class="btn-ghost">Cerrar</button>
        </div>
        <div class="grid gap-4">
          <div>
            <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoMarca">Marca</label>
            <select id="registrarEquipoMarca" class="input-field mt-1"></select>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoBtus">BTU</label>
              <select id="registrarEquipoBtus" class="input-field mt-1"></select>
            </div>
            <div>
              <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoPresion">Presión</label>
              <input id="registrarEquipoPresion" type="number" min="0" class="input-field mt-1" />
            </div>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoAmperaje">Amperaje</label>
              <input id="registrarEquipoAmperaje" type="number" min="0" class="input-field mt-1" />
            </div>
            <div>
              <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoVoltaje">Voltaje</label>
              <input id="registrarEquipoVoltaje" type="number" min="0" class="input-field mt-1" />
            </div>
          </div>
          <div>
            <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoEstado">Estado</label>
            <select id="registrarEquipoEstado" class="input-field mt-1">
              <option value="operativo">Operativo</option>
              <option value="en_revision">Revisión</option>
              <option value="fuera_de_servicio">Averiado</option>
            </select>
            <label class="mt-3 inline-flex items-center gap-3 text-sm text-[var(--text)]">
              <input id="registrarEquipoMantenimientoVencido" type="checkbox" class="h-5 w-5 rounded border border-white/40 bg-white/10 accent-[var(--primary)] cursor-pointer" />
              <span>Mantenimiento vencido</span>
            </label>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoInstalacion">Fecha de instalación</label>
              <input id="registrarEquipoInstalacion" type="date" class="input-field mt-1" />
            </div>
          </div>
          <div>
            <label class="text-sm text-[var(--text-dim)]" for="registrarEquipoNotas">Notas</label>
            <textarea id="registrarEquipoNotas" rows="4" class="input-field mt-1 resize-none"></textarea>
          </div>
          <div id="registrarEquipoError" class="text-sm text-danger hidden"></div>
          <div id="registrarEquipoSuccess" class="text-sm text-success hidden"></div>
          <div class="flex items-center justify-end gap-3 pt-2 border-t border-white/10">
            <button id="registrarEquipoCancel" class="btn-secondary">Cancelar</button>
            <button id="registrarEquipoSave" class="btn-primary">Registrar</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./equipos.js"></script>
  </body>
</html>
